<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fahmi Studio Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            color: #333;
        }
        header {
            background-color: #282c34;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        .portfolio-item {
            float: left;
            width: 30%;
            margin: 1.66%;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .portfolio-item:hover {
            transform: scale(1.05);
        }
        .portfolio-item img {
            width: 100%;
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #282c34;
            color: white;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Fahmi Studio</h1>
        <p>Your go-to place for modern designs and web solutions</p>
    </header>
    <div class="container">
        <div class="portfolio-item">
            <img src="project1.jpg" alt="Project 1">
            <h3>Project 1</h3>
            <p>Short description of project 1.</p>
        </div>
        <div class="portfolio-item">
            <img src="project2.jpg" alt="Project 2">
            <h3>Project 2</h3>
            <p>Short description of project 2.</p>
        </div>
        <div class="portfolio-item">
            <img src="project3.jpg" alt="Project 3">
            <h3>Project 3</h3>
            <p>Short description of project 3.</p>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 Fahmi Studio. All rights reserved.</p>
    </footer>
    <script>
        // Add JavaScript animations or interactions here
    </script>
</body>
</html>
