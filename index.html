<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fahmi Studio Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            transition: background-color 0.5s;
        }
        header {
            background-color: #4a90e2;
            color: white;
            padding: 20px;
            text-align: center;
            transition: background-color 0.5s;
        }
        nav a {
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            transition: background-color 0.3s, transform 0.3s;
        }
        nav a:hover {
            background-color: #357ab8;
            transform: scale(1.05);
        }
        .portfolio {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .portfolio-item {
            margin: 10px;
            padding: 15px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .portfolio-item:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Fahmi Studio Portfolio</h1>
        <nav>
            <a href="https://parfume.my.id">Parfume</a>
            <a href="https://laundriaja.my.id">Laundriaja</a>
            <a href="https://ai-marketing.my.id">AI Marketing</a>
        </nav>
    </header>
    <div class="portfolio">
        <div class="portfolio-item"><h2>Project 1: Parfume</h2></div>
        <div class="portfolio-item"><h2>Project 2: Laundriaja</h2></div>
        <div class="portfolio-item"><h2>Project 3: AI Marketing</h2></div>
    </div>
</body>
</html>
